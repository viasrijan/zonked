name: Aggregate Articles

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Trigger aggregation
        run: |
          curl -X POST "https://zonked.vercel.app/api/aggregate" \
            -H "Content-Type: application/json" \
            --max-time 240 \
            --fail || true